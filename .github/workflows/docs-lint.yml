name: docs-lint

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run documentation test suite
        run: bash scripts/docs-lint.sh

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --accept 200..=299,429 '**/*.md'"
          fail: false

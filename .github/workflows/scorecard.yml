# OpenSSF Scorecard — automated supply-chain / repo-health analysis (0–10).
# Publishes results to the public Scorecard API so the README badge works.
# Actions are pinned by full commit SHA (Pinned-Dependencies best practice).
# Docs: https://github.com/ossf/scorecard-action
name: Scorecard supply-chain security
on:
  # Re-run when branch protection rules change
  branch_protection_rule:
  # Weekly, Monday 07:20 UTC
  schedule:
    - cron: '20 7 * * 1'
  push:
    branches: [ "main" ]

# Read-all by default; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard
      security-events: write
      # Needed to publish results and get a badge (OIDC)
      id-token: write
    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF API → enables the README badge.
          # Requires a public repo (this one is).
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif

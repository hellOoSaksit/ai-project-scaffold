# OpenSSF Scorecard — automated supply-chain / repo-health analysis (0–10).
# Publishes results to the public Scorecard API so the README badge works.
# Docs: https://github.com/ossf/scorecard-action
name: Scorecard supply-chain security
on:
  # Re-run when branch protection rules change
  branch_protection_rule:
  # Weekly, Monday 07:20 UTC
  schedule:
    - cron: '20 7 * * 1'
  push:
    branches: [ "main" ]

# Read-all by default; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard
      security-events: write
      # Needed to publish results and get a badge (OIDC)
      id-token: write
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF API → enables the README badge.
          # Requires a public repo (this one is).
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
